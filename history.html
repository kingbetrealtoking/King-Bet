<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingBet - History</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .back-btn { color: #ffcc00; text-decoration: none; display: inline-block; margin-bottom: 20px; font-weight: bold; }
        h2 { text-align: center; color: white; margin-bottom: 20px; }
        
        .history-item { 
            background: #333; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        
        .history-info { display: flex; flex-direction: column; }
        .game-name { font-weight: bold; font-size: 16px; }
        .date-time { font-size: 12px; color: #aaa; margin-top: 4px; }
        
        /* වර්ණ සැකසුම් */
        .win { color: #28a745; font-weight: bold; }
        .lose { color: #dc3545; font-weight: bold; }
        .deposit { color: #28a745; font-weight: bold; } /* තැන්පත් කිරීම් - කොළ */
        .withdraw { color: #ffc107; font-weight: bold; } /* මුදල් ඉල්ලීම් - කහ */
    </style>
</head>
<body>
    <a href="dashboard.html" class="back-btn">← Back</a>
    <h2>Bet History</h2>
    
    <div id="history-list">
        </div>

    <script>
        let history = JSON.parse(localStorage.getItem('betHistory')) || [];
        let list = document.getElementById('history-list');

        if (history.length === 0) {
            list.innerHTML = "<p style='text-align:center; color:#666;'>No history yet.</p>";
        } else {
            history.slice().reverse().forEach(item => {
                let div = document.createElement('div');
                div.className = 'history-item';
                
                let timeDisplay = item.time ? item.time : "N/A";
                
                // මුදල සහ වර්ණය තීරණය කිරීම
                let amountText = "";
                if (item.status === 'win') amountText = '+' + item.amount + ' LKR';
                else if (item.status === 'lose') amountText = '-' + item.amount + ' LKR';
                else amountText = item.amount + ' LKR'; // Deposit/Withdraw සඳහා

                div.innerHTML = `
                    <div class="history-info">
                        <span class="game-name">${item.game}</span>
                        <span class="date-time">${timeDisplay}</span>
                    </div>
                    <span class="${item.status}">${amountText}</span>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
