<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingBet - Login</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { color: #ffcc00; margin-bottom: 20px; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: white; }
        button { background: #ffcc00; color: black; padding: 12px 40px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 90%; margin-top: 15px; }
        .register-link { margin-top: 20px; }
        a { color: #ffcc00; text-decoration: none; }
    </style>
</head>
<body>
    <h1>KingBet Login</h1>
    
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    
    <button onclick="window.location.href='dashboard.html'">Login</button>
    
    <div class="register-link">
        <p>Don't have an account? <a href="register.html">Register here</a></p>
    </div>
</body>
</html>
