<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingBet - Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .wallet-card { background: #333; padding: 20px; border-radius: 15px; border: 1px solid #ffcc00; text-align: center; }
        .balance { font-size: 32px; color: #ffcc00; font-weight: bold; margin: 10px 0; }
        .acc-id { font-size: 14px; color: #ccc; margin-bottom: 10px; }
        .btn-box { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        button { padding: 15px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; }
        .dep-btn { background: #28a745; color: white; }
        .with-btn { background: #dc3545; color: white; }
        .game-list { margin-top: 20px; background: #222; padding: 15px; border-radius: 10px; }
        .game-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #444; color: white; text-decoration: none; font-size: 18px; }
    </style>
</head>
<body>
    <div class="top-nav">
        <h2>Dashboard</h2>
        <a href="settings.html" style="color:#ffcc00; text-decoration:none;">⚙️ Settings</a>
    </div>
    
    <div class="wallet-card">
        <p>Current Balance</p>
        <div class="balance" id="bal">0.00</div>
        <div class="acc-id" id="accNum">Loading Account...</div>
    </div>
    
    <div class="btn-box">
        <button class="dep-btn" onclick="location.href='deposit.html'">Deposit</button>
        <button class="with-btn" onclick="location.href='withdraw.html'">Withdraw</button>
    </div>

    <div class="game-list">
        <h3>Available Games</h3>
        <a href="game.html" class="game-item">Color Prediction</a>
        <a href="game2.html" class="game-item">Lucky Dice</a>
        <a href="game3.html" class="game-item">Coin Flip</a>
        <a href="#" class="game-item">Football Betting</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        // ඔබේ Firebase Config දත්ත මෙතැනට අනිවාර්යයෙන්ම ඇතුළත් කරන්න
        const firebaseConfig = {
            apiKey: "ඔබේ_API_KEY",
            authDomain: "ඔබේ_PROJECT_ID.firebaseapp.com",
            projectId: "ඔබේ_PROJECT_ID",
            storageBucket: "ඔබේ_PROJECT_ID.appspot.com",
            messagingSenderId: "ඔබේ_SENDER_ID",
            appId: "ඔබේ_APP_ID"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // පරිශීලකයා ලොග් වී ඇත්දැයි පරීක්ෂා කිරීම
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // පරිශීලකයා ලොග් වී ඇත්නම් Firestore වෙතින් දත්ත ලබා ගැනීම
                const userRef = doc(db, "users", user.uid);
                
                onSnapshot(userRef, (doc) => {
                    if (doc.exists()) {
                        const data = doc.data();
                        document.getElementById('bal').innerText = parseFloat(data.balance || 0).toFixed(2);
                        document.getElementById('accNum').innerText = "ID: " + (data.accountNumber || "N/A");
                    } else {
                        document.getElementById('accNum').innerText = "ගිණුම් දත්ත හමු නොවීය";
                    }
                }, (error) => {
                    console.error("දත්ත ලබා ගැනීමේ දෝෂයක්:", error);
                });
            } else {
                // ලොග් වී නැත්නම් login පේජ් එකට යැවීම
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
