<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingBet - Dashboard</title>
    <script src="lang.js"></script> 
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .wallet-card { background: #333; padding: 20px; border-radius: 15px; border: 1px solid #ffcc00; text-align: center; }
        .balance { font-size: 32px; color: #ffcc00; font-weight: bold; margin: 10px 0; }
        .btn-box { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        button { padding: 15px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; }
        .dep-btn { background: #28a745; color: white; }
        .with-btn { background: #dc3545; color: white; }
        .history-link { display: block; text-align: center; margin-top: 10px; color: #ffcc00; text-decoration: none; font-size: 14px; }
        .game-list { margin-top: 20px; background: #222; padding: 15px; border-radius: 10px; }
        .game-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #444; color: white; text-decoration: none; font-size: 18px; }
    </style>
</head>
<body>
    <div class="top-nav">
        <h2 data-lang="dashboard">Dashboard</h2>
        <a href="settings.html" style="color:#ffcc00; text-decoration:none;">⚙️ <span data-lang="settings">Settings</span></a>
    </div>
    
    <div class="wallet-card">
        <p data-lang="balance">Current Balance</p>
        <div class="balance" id="bal">1000.00</div>
        <a href="history.html" class="history-link">View Transaction History</a>
    </div>
    
    <div class="btn-box">
        <button class="dep-btn" onclick="location.href='deposit.html'" data-lang="deposit">Deposit</button>
        <button class="with-btn" onclick="location.href='withdraw.html'" data-lang="withdraw">Withdraw</button>
    </div>

    <div class="game-list">
        <h3 data-lang="games">Available Games</h3>
        <a href="game.html" class="game-item" data-lang="color">Color Prediction</a>
        <a href="game2.html" class="game-item" data-lang="dice">Lucky Dice</a>
        <a href="game3.html" class="game-item" data-lang="coin">Coin Flip</a>
        <a href="#" class="game-item" data-lang="football">Football Betting</a>
    </div>

    <script>
        document.getElementById('bal').innerText = (parseFloat(localStorage.getItem('userBalance')) || 1000.00).toFixed(2);
        applyLanguage();
    </script>
</body>
</html>
