<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingBet - Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .wallet-card { background: #333; padding: 20px; border-radius: 15px; border: 1px solid #ffcc00; text-align: center; }
        .balance { font-size: 32px; color: #ffcc00; font-weight: bold; margin: 10px 0; }
        .acc-id { font-size: 14px; color: #ccc; margin-bottom: 10px; }
        .btn-box { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        button { padding: 15px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; }
        .dep-btn { background: #28a745; color: white; }
        .with-btn { background: #dc3545; color: white; }
        .game-list { margin-top: 20px; background: #222; padding: 15px; border-radius: 10px; }
        .game-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #444; color: white; text-decoration: none; font-size: 18px; }
    </style>
</head>
<body>
    <div class="top-nav">
        <h2>Dashboard</h2>
        <a href="settings.html" style="color:#ffcc00; text-decoration:none;">⚙️ Settings</a>
    </div>
    
    <div class="wallet-card">
        <p>Current Balance</p>
        <div class="balance" id="bal">Loading...</div>
        <div class="acc-id" id="accNum">Loading Account...</div>
    </div>
    
    <div class="btn-box">
        <button class="dep-btn" onclick="location.href='deposit.html'">Deposit</button>
        <button class="with-btn" onclick="location.href='withdraw.html'">Withdraw</button>
    </div>

    <div class="game-list">
        <h3>Available Games</h3>
        <a href="game.html" class="game-item">Color Prediction</a>
        <a href="game2.html" class="game-item">Lucky Dice</a>
        <a href="game3.html" class="game-item">Coin Flip</a>
        <a href="#" class="game-item">Football Betting</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        // // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB4aqoDAOuLiGoO3cx2FPvdF1s8zgn_eU4",
  authDomain: "king-bet-2aa4f.firebaseapp.com",
  projectId: "king-bet-2aa4f",
  storageBucket: "king-bet-2aa4f.firebasestorage.app",
  messagingSenderId: "461934419384",
  appId: "1:461934419384:web:172ac798e06bc2a032c34d",
  measurementId: "G-6KZGYT2J9D"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
        const firebaseConfig = {
            apiKey: "ඔබේ_API_KEY",
            authDomain: "ඔබේ_AUTH_DOMAIN",
            projectId: "ඔබේ_PROJECT_ID",
            storageBucket: "ඔබේ_STORAGE_BUCKET",
            messagingSenderId: "ඔබේ_MESSAGING_SENDER_ID",
            appId: "ඔබේ_APP_ID"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // ලොග් වූ පාරිභෝගිකයාගේ දත්ත Firestore එකෙන් ලබා ගැනීම
                onSnapshot(doc(db, "users", user.uid), (doc) => {
                    if (doc.exists()) {
                        const data = doc.data();
                        document.getElementById('bal').innerText = parseFloat(data.balance).toFixed(2);
                        document.getElementById('accNum').innerText = "ID: " + data.accountNumber;
                    }
                });
            } else {
                // ලොග් වෙලා නැත්නම් login පේජ් එකට යවන්න
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
